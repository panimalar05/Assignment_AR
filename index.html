<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Gaze Game Final</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
let score = 0;

// 🎯 Spawn with RANDOM + FLOAT
function spawnObject(){
  let target = document.querySelector("#target");

  // random position
  let x = (Math.random() - 0.5) * 2;
  let y = (Math.random() - 0.5) * 1;

  target.setAttribute('position', `${x} ${y} -1.5`);
  target.setAttribute('visible', true);

  // floating animation
  target.setAttribute('animation', {
    property: 'position',
    to: `${x} ${y + 0.3} -1.5`,
    dir: 'alternate',
    loop: true,
    dur: 1000,
    easing: 'easeInOutQuad'
  });
}

// 👀 Gaze collect
AFRAME.registerComponent('collect', {
  init: function () {
    this.el.addEventListener('mouseenter', () => {

      this.el.setAttribute('visible', false);

      score++;
      document.querySelector("#score")
        .setAttribute('value', "Score: " + score);

      // respawn
      setTimeout(() => {
        spawnObject();
      }, 800);
    });
  }
});

// first spawn
setTimeout(() => {
  spawnObject();
}, 2000);

</script>

<a-scene ar>

  <!-- 📷 Camera -->
  <a-camera>

    <!-- 🎯 Cursor -->
    <a-cursor fuse="true" fuse-timeout="800"></a-cursor>

    <!-- 📊 Score (FIXED) -->
    <a-text id="score"
      value="Score: 0"
      position="0 0 -1"
      align="center"
      color="yellow"
      width="2">
    </a-text>

  </a-camera>

  <!-- 🟡 Target -->
  <a-sphere
    id="target"
    radius="0.2"
    color="yellow"
    visible="false"
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
