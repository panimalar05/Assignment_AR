<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Clean Base Game</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
let score = 0;

/* SIMPLE FLOAT */
AFRAME.registerComponent('float', {
  init: function () {
    this.startY = this.el.object3D.position.y;
    this.t = Math.random() * 10;
  },
  tick: function () {
    this.t += 0.002;
    this.el.object3D.position.y =
      this.startY + Math.sin(this.t) * 0.15;
  }
});

/* SPAWN OBJECT */
function spawnObject() {
  let obj = document.querySelector("#target");

  let x = (Math.random() - 0.5) * 1.2;
  let y = (Math.random() - 0.5) * 0.8;

  obj.setAttribute("position", `${x} ${y} -1.5`);
  obj.setAttribute("visible", true);
  obj.setAttribute("scale", "1 1 1");
  obj.setAttribute("collected", "false");
}

/* COLLECT LOGIC */
AFRAME.registerComponent('collect', {
  init: function () {
    this.el.addEventListener('click', () => {

      if (this.el.getAttribute("collected") === "true") return;

      this.el.setAttribute("collected", "true");

      // pop effect
      this.el.setAttribute("scale", "0.4 0.4 0.4");

      setTimeout(() => {
        this.el.setAttribute("visible", false);
      }, 100);

      // score update
      score++;
      document.querySelector("#scoreText")
        .setAttribute("value", "Score: " + score);

      // respawn next object
      setTimeout(spawnObject, 400);
    });
  }
});

/* START GAME */
setTimeout(spawnObject, 1000);
</script>

<a-scene ar>

  <!-- CAMERA -->
  <a-camera cursor="rayOrigin: mouse"></a-camera>

  <!-- SCORE UI -->
  <a-entity position="0 0 -1">
    <a-text id="scoreText"
      value="Score: 0"
      align="center"
      color="yellow"
      width="2">
    </a-text>
  </a-entity>

  <!-- TARGET OBJECT -->
  <a-sphere
    id="target"
    radius="0.2"
    color="yellow"
    visible="false"
    float
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
