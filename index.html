<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Game - Lives System</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
let score = 0;
let lives = 3;
let gameOver = false;
let despawnTimer = null;

// 🎯 FLOAT
AFRAME.registerComponent('float', {
  schema: { speed: { default: 0.002 } },
  init: function () {
    this.startY = this.el.object3D.position.y;
    this.t = Math.random() * 10;
  },
  tick: function () {
    this.t += this.data.speed;
    this.el.object3D.position.y =
      this.startY + Math.sin(this.t) * 0.15;
  }
});

// 📊 UPDATE HUD
function updateHUD() {
  document.querySelector("#scoreText")
    .setAttribute("value", "Score: " + score);

  document.querySelector("#lifeText")
    .setAttribute("value", "Lives: " + lives);
}

// 💀 GAME OVER
function endGame() {
  gameOver = true;

  document.querySelector("#gameOverText")
    .setAttribute("visible", true);

  document.querySelector("#restartBtn")
    .setAttribute("visible", true);
}

// 🔁 RESTART GAME
function restartGame() {
  score = 0;
  lives = 3;
  gameOver = false;

  document.querySelector("#gameOverText")
    .setAttribute("visible", false);

  document.querySelector("#restartBtn")
    .setAttribute("visible", false);

  updateHUD();
  spawnObject();
}

// 🎯 SPAWN OBJECT
function spawnObject() {
  if (gameOver) return;

  let target = document.querySelector("#target");

  let x = (Math.random() - 0.5) * 1.2;
  let y = (Math.random() - 0.5) * 0.8;

  target.setAttribute("position", `${x} ${y} -1.5`);
  target.setAttribute("visible", true);
  target.setAttribute("scale", "1 1 1");
  target.setAttribute("color", "yellow");

  target.setAttribute("collected", "false");

  // ⏱️ DESPAWN TIMER (MISS CHECK)
  clearTimeout(despawnTimer);

  despawnTimer = setTimeout(() => {
    let collected = target.getAttribute("collected");

    if (collected === "false" && !gameOver) {
      target.setAttribute("visible", false);

      lives--;
      updateHUD();

      if (lives <= 0) {
        endGame();
      } else {
        spawnObject();
      }
    }
  }, 2500);
}

// 🎯 COLLECT SYSTEM
AFRAME.registerComponent('collect', {
  init: function () {
    this.el.addEventListener('mouseenter', () => {

      if (gameOver) return;

      let collected = this.el.getAttribute("collected");
      if (collected === "true") return;

      this.el.setAttribute("collected", "true");

      // hide + pop
      this.el.setAttribute("scale", "0.4 0.4 0.4");

      setTimeout(() => {
        this.el.setAttribute("visible", false);
      }, 100);

      // score update
      score++;
      updateHUD();

      // spawn next
      setTimeout(() => {
        spawnObject();
      }, 500);
    });
  }
});

// initial spawn
setTimeout(spawnObject, 1000);

</script>

<a-scene ar>

  <!-- CAMERA -->
  <a-camera>
    <a-cursor fuse="true" fuse-timeout="700"></a-cursor>

    <!-- HUD -->
    <a-entity position="0 0 -1">
      <a-text id="scoreText" value="Score: 0"
        align="center" color="yellow" width="2"></a-text>

      <a-text id="lifeText" value="Lives: 3"
        position="0 -0.2 0"
        align="center" color="red" width="2"></a-text>
    </a-entity>

    <!-- GAME OVER -->
    <a-text id="gameOverText"
      value="GAME OVER"
      position="0 0 -1"
      align="center"
      color="red"
      width="3"
      visible="false">
    </a-text>

    <!-- RESTART BUTTON -->
    <a-box id="restartBtn"
      position="0 -0.5 -1"
      depth="0.1"
      height="0.2"
      width="0.6"
      color="green"
      visible="false"
      onclick="restartGame()">
    </a-box>

    <a-text value="RESTART"
      position="0 -0.5 -0.9"
      align="center"
      color="white"
      width="2"
      visible="false"
      id="restartText">
    </a-text>

  </a-camera>

  <!-- TARGET -->
  <a-sphere
    id="target"
    radius="0.2"
    color="yellow"
    visible="false"
    float
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
