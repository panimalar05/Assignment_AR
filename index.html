<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Game Final</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
// AR logic (same working one)
AFRAME.registerComponent('ar-logic',{
  tick : function(){
    let cam = document.querySelector("#cam");
    if(!cam) return;

    let collision = cam.components.raycaster.getIntersection(this.el);
    if(!collision) return;

    let circle = document.querySelector("#circle");
    circle.setAttribute('position', collision.point);
  }
});

// game
let score = 0;

function spawnObject(pos){
  let target = document.querySelector("#target");

  target.setAttribute('position', {
    x: pos.x,
    y: pos.y + 0.5,
    z: pos.z
  });

  target.setAttribute('visible', true);
}

// 🎯 LOOK TO COLLECT (NO CLICK NEEDED)
AFRAME.registerComponent('collect', {
  init: function () {
    this.el.addEventListener('mouseenter', () => {

      this.el.setAttribute('visible', false);

      score++;
      document.querySelector("#score")
        .setAttribute('value', "Score: " + score);
    });
  }
});

// spawn automatically every 2 sec
setInterval(() => {
  let circle = document.querySelector("#circle");
  if(!circle) return;

  let pos = circle.getAttribute('position');
  spawnObject(pos);
}, 2000);

</script>

<a-scene ar ar-logic>

  <!-- Camera -->
  <a-camera id="cam" ar-raycaster raycaster="objects:none;">

    <!-- Cursor (IMPORTANT) -->
    <a-cursor fuse="true" fuse-timeout="800"></a-cursor>

    <!-- Score -->
    <a-text id="score"
      value="Score: 0"
      position="0 -0.2 -0.5"
      align="center"
      width="2">
    </a-text>

  </a-camera>

  <!-- Surface indicator -->
  <a-ring
    id="circle"
    rotation="-90 0 0"
    radius-inner="0.02"
    radius-outer="0.03"
    color="white">
  </a-ring>

  <!-- Target -->
  <a-sphere
    id="target"
    radius="0.15"
    color="yellow"
    visible="false"
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
