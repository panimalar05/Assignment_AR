<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Falling Game</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
// 🔹 Surface detection
AFRAME.registerComponent('ar-logic',{
  tick : function(){
    let cam = document.querySelector("#cam");
    let circle = document.querySelector("#circle");

    if(!cam || !circle) return;

    let intersection = cam.components.raycaster.getIntersection(this.el);
    if(!intersection) return;

    circle.setAttribute('position', intersection.point);
  }
});

// 🔹 Game variables
let score = 0;
let falling = false;

// 🔹 Spawn object (FIXED POSITION LOGIC)
function spawnObject(pos){
  let target = document.querySelector("#target");

  // Always spawn slightly in front of camera view
  target.setAttribute('position', {
    x: pos.x,
    y: pos.y + 1,
    z: pos.z - 1
  });

  target.setAttribute('visible', true);

  // Falling animation
  target.setAttribute('animation', {
    property: 'position',
    to: `${pos.x} ${pos.y} ${pos.z - 1}`,
    dur: 2000,
    easing: 'linear'
  });

  falling = true;

  // Auto disappear if missed
  setTimeout(() => {
    if(falling){
      target.setAttribute('visible', false);
      falling = false;
    }
  }, 2000);
}

// 🔹 Tap event (WORKS IN AR)
document.addEventListener('click', function(){

  console.log("Tapped"); // debug

  let circle = document.querySelector("#circle");
  let target = document.querySelector("#target");

  let pos = circle.getAttribute('position');

  if(!falling){
    spawnObject(pos);
  }
  else {
    target.setAttribute('visible', false);
    falling = false;

    score++;
    document.querySelector("#score")
      .setAttribute('value', "Score: " + score);
  }

});
</script>

<a-scene ar ar-logic>

  <!-- Camera -->
  <a-camera id="cam" ar-raycaster>

    <a-text id="score"
      value="Score: 0"
      position="0 -0.2 -0.5"
      align="center"
      width="2">
    </a-text>

  </a-camera>

  <!-- Invisible ground (IMPORTANT for raycasting) -->
  <a-plane 
    rotation="-90 0 0"
    width="50"
    height="50"
    visible="false">
  </a-plane>

  <!-- Surface indicator -->
  <a-ring
    id="circle"
    rotation="-90 0 0"
    radius-inner="0.02"
    radius-outer="0.03"
    color="white">
  </a-ring>

  <!-- Falling object -->
  <a-sphere
    id="target"
    radius="0.15"
    color="yellow"
    visible="false">
  </a-sphere>

</a-scene>

</body>
</html>
