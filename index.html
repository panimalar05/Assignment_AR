<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Magic Effects</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
// AR logic
AFRAME.registerComponent('ar-logic',{
  tick : function(){
    let cam = document.querySelector("#cam");
    let circle = document.querySelector("#circle");

    if(!cam || !circle) return;

    let collision = cam.components.raycaster.getIntersection(this.el);
    if(!collision) return;

    circle.setAttribute('position', collision.point);
  }
});

// ✨ MAGIC EFFECT
window.addEventListener('touchstart', function(){

  let pos = document.querySelector("#circle").getAttribute('position');

  let effect = document.createElement('a-ring');

  effect.setAttribute('position', pos);
  effect.setAttribute('rotation', '-90 0 0');

  effect.setAttribute('radius-inner', '0.05');
  effect.setAttribute('radius-outer', '0.06');

  effect.setAttribute('color', '#00ffff');
  effect.setAttribute('opacity', '0.8');

  effect.setAttribute('animation__scale', {
    property: 'scale',
    to: '3 3 3',
    dur: 800,
    easing: 'easeOutQuad'
  });

  effect.setAttribute('animation__fade', {
    property: 'opacity',
    to: '0',
    dur: 800
  });

  setTimeout(() => {
    effect.parentNode.removeChild(effect);
  }, 800);

  document.querySelector('a-scene').appendChild(effect);

});
</script>

<a-scene ar ar-logic>

  <!-- Camera -->
  <a-camera id="cam" ar-raycaster raycaster="objects:none;"></a-camera>

  <!-- Placement indicator -->
  <a-ring
    id="circle"
    rotation="-90 0 0"
    radius-inner="0.01"
    radius-outer="0.02"
    color="white">
  </a-ring>

</a-scene>

</body>
</html>
