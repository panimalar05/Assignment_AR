<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stable AR Base Game</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
let score = 0;

/* FLOAT ANIMATION */
AFRAME.registerComponent('float', {
  init: function () {
    this.baseY = this.el.object3D.position.y;
    this.t = Math.random() * 10;
  },
  tick: function () {
    this.t += 0.002;
    this.el.object3D.position.y =
      this.baseY + Math.sin(this.t) * 0.15;
  }
});

/* SPAWN OBJECT */
function spawnObject() {
  const obj = document.querySelector("#target");

  let x = (Math.random() - 0.5) * 1.2;
  let y = (Math.random() - 0.5) * 0.8;

  obj.setAttribute("position", `${x} ${y} -2`);
  obj.setAttribute("visible", true);
  obj.setAttribute("scale", "1 1 1");
  obj.setAttribute("collected", "false");
}

/* COLLECT LOGIC */
AFRAME.registerComponent('collect', {
  init: function () {
    this.el.addEventListener('click', () => {

      if (this.el.getAttribute("collected") === "true") return;

      this.el.setAttribute("collected", "true");

      // pop effect
      this.el.setAttribute("scale", "0.3 0.3 0.3");

      setTimeout(() => {
        this.el.setAttribute("visible", false);
      }, 120);

      // score update
      score++;
      document.querySelector("#scoreText")
        .setAttribute("value", "Score: " + score);

      // respawn
      setTimeout(spawnObject, 350);
    });
  }
});

/* START */
setTimeout(spawnObject, 1000);
</script>

<a-scene>

  <!-- CAMERA + GAZE CONTROL -->
  <a-camera>
    <a-cursor
      fuse="true"
      fuse-timeout="700"
      rayOrigin="mouse">
    </a-cursor>
  </a-camera>

  <!-- SCORE UI -->
  <a-entity position="0 1.6 -2">
    <a-text id="scoreText"
      value="Score: 0"
      align="center"
      color="yellow"
      width="3">
    </a-text>
  </a-entity>

  <!-- TARGET -->
  <a-sphere
    id="target"
    radius="0.2"
    color="yellow"
    visible="false"
    class="clickable"
    float
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
