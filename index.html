<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Tap Game</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
// ✅ AR surface tracking (KEEP SAME)
AFRAME.registerComponent('ar-logic',{
  tick : function(){
    let cam = document.querySelector("#cam");
    if(!cam) return;

    let collision = cam.components.raycaster.getIntersection(this.el);
    if(!collision) return;

    let circle = document.querySelector("#circle");
    circle.setAttribute('position', collision.point);
  }
});

// 🎯 Game
let score = 0;

// spawn object
function spawnObject(){
  let target = document.querySelector("#target");

  // ALWAYS place in front (VISIBLE GUARANTEED)
  target.setAttribute('position', '0 1 -2');
  target.setAttribute('visible', true);
}

// tap to collect (ATTACHED TO OBJECT — IMPORTANT)
AFRAME.registerComponent('collect', {
  init: function () {
    this.el.addEventListener('click', () => {

      this.el.setAttribute('visible', false);

      score++;
      document.querySelector("#score")
        .setAttribute('value', "Score: " + score);

      // respawn
      setTimeout(() => {
        spawnObject();
      }, 800);
    });
  }
});

// first spawn
setTimeout(() => {
  spawnObject();
}, 2000);

</script>

<a-scene ar ar-logic>

  <!-- Camera -->
  <a-camera id="cam" ar-raycaster>

    <!-- Cursor -->
    <a-cursor></a-cursor>

    <!-- Score -->
    <a-text id="score"
      value="Score: 0"
      position="0 -0.2 -0.5"
      align="center"
      width="2">
    </a-text>

  </a-camera>

  <!-- Circle -->
  <a-ring
    id="circle"
    rotation="-90 0 0"
    radius-inner="0.02"
    radius-outer="0.03"
    color="white">
  </a-ring>

  <!-- Target -->
  <a-sphere
    id="target"
    radius="0.2"
    color="yellow"
    visible="false"
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
