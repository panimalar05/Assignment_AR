<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Falling Game</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
// 🔹 HUD
function showMessage(message){
  let hud = document.querySelector("#hud");
  if(hud) hud.setAttribute('value', message);
}

// 🔹 AR logic (same as your working code)
AFRAME.registerComponent('ar-logic',{
  tick : function(){
    let cam = document.querySelector("#cam");
    if(!cam) return;

    let collision = cam.components.raycaster.getIntersection(this.el);
    if(!collision) return;

    let circle = document.querySelector("#circle");
    circle.setAttribute('position', collision.point);
  }
});

// 🔹 Game variables
let score = 0;
let falling = false;

// 🔹 Spawn object (SIMPLE + SAFE)
function spawnObject(pos){
  let target = document.querySelector("#target");

  target.setAttribute('position', {
    x: pos.x,
    y: pos.y + 0.5,
    z: pos.z
  });

  target.setAttribute('visible', true);

  // falling
  target.setAttribute('animation', {
    property: 'position',
    to: `${pos.x} ${pos.y} ${pos.z}`,
    dur: 1500,
    easing: 'linear'
  });

  falling = true;

  setTimeout(() => {
    if(falling){
      target.setAttribute('visible', false);
      falling = false;
    }
  }, 1500);
}

// 🔹 IMPORTANT: use touchstart (your setup worked with it earlier)
window.addEventListener('touchstart', function(){

  showMessage("Tapped!");

  let circle = document.querySelector("#circle");
  let target = document.querySelector("#target");

  let pos = circle.getAttribute('position');

  if(!falling){
    spawnObject(pos);
  }
  else {
    target.setAttribute('visible', false);
    falling = false;

    score++;
    document.querySelector("#score")
      .setAttribute('value', "Score: " + score);
  }

});
</script>

<a-scene ar ar-logic>

  <!-- Camera -->
  <a-camera id="cam" ar-raycaster raycaster="objects:none;">

    <!-- Score -->
    <a-text id="score"
      value="Score: 0"
      position="0 -0.2 -0.5"
      align="center"
      width="2">
    </a-text>

    <!-- HUD -->
    <a-text id="hud"
      value="Starting..."
      position="0 -0.3 -0.5"
      align="center"
      width="2">
    </a-text>

  </a-camera>

  <!-- Surface indicator -->
  <a-ring
    id="circle"
    rotation="-90 0 0"
    radius-inner="0.02"
    radius-outer="0.03"
    color="white">
  </a-ring>

  <!-- Falling object -->
  <a-sphere
    id="target"
    radius="0.15"
    color="yellow"
    visible="false">
  </a-sphere>

</a-scene>

</body>
</html>
