<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Lives Game - Final Fixed Version</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
let score = 0;
let lives = 3;
let gameOver = false;
let despawnTimer = null;

/* FLOAT ANIMATION */
AFRAME.registerComponent('float', {
  init: function () {
    this.startY = this.el.object3D.position.y;
    this.t = Math.random() * 10;
  },
  tick: function () {
    this.t += 0.002;
    this.el.object3D.position.y =
      this.startY + Math.sin(this.t) * 0.15;
  }
});

/* UPDATE HUD */
function updateHUD() {
  document.querySelector("#scoreText").setAttribute("value", "Score: " + score);
  document.querySelector("#lifeText").setAttribute("value", "Lives: " + lives);
}

/* GAME OVER */
function endGame() {
  gameOver = true;

  document.querySelector("#gameOverText").setAttribute("visible", true);
  document.querySelector("#restartEntity").setAttribute("visible", true);
}

/* RESTART GAME */
function restartGame() {
  score = 0;
  lives = 3;
  gameOver = false;

  document.querySelector("#gameOverText").setAttribute("visible", false);
  document.querySelector("#restartEntity").setAttribute("visible", false);

  updateHUD();
  spawnObject();
}

/* SPAWN OBJECT */
function spawnObject() {
  if (gameOver) return;

  let target = document.querySelector("#target");

  let x = (Math.random() - 0.5) * 1.2;
  let y = (Math.random() - 0.5) * 0.8;

  target.setAttribute("position", `${x} ${y} -1.5`);
  target.setAttribute("visible", true);
  target.setAttribute("scale", "1 1 1");
  target.setAttribute("collected", "false");

  clearTimeout(despawnTimer);

  despawnTimer = setTimeout(() => {
    if (!gameOver && target.getAttribute("collected") === "false") {
      target.setAttribute("visible", false);

      lives--;
      updateHUD();

      if (lives <= 0) {
        endGame();
      } else {
        spawnObject();
      }
    }
  }, 2500);
}

/* COLLECT LOGIC */
AFRAME.registerComponent('collect', {
  init: function () {
    this.el.addEventListener('click', () => {

      if (gameOver) return;
      if (this.el.getAttribute("collected") === "true") return;

      this.el.setAttribute("collected", "true");

      // pop effect
      this.el.setAttribute("scale", "0.4 0.4 0.4");

      setTimeout(() => {
        this.el.setAttribute("visible", false);
      }, 100);

      score++;
      updateHUD();

      setTimeout(() => {
        spawnObject();
      }, 400);
    });
  }
});

/* START */
setTimeout(spawnObject, 1000);

/* RESTART CLICK HANDLER */
document.addEventListener("DOMContentLoaded", () => {
  document.querySelector("#restartBox").addEventListener("click", restartGame);
});
</script>

<a-scene ar>

  <!-- CAMERA -->
  <a-camera>
    <a-cursor rayOrigin="mouse"></a-cursor>

    <!-- HUD -->
    <a-entity position="0 0 -1">
      <a-text id="scoreText" value="Score: 0"
        align="center" color="yellow" width="2"></a-text>

      <a-text id="lifeText" value="Lives: 3"
        position="0 -0.25 0"
        align="center" color="red" width="2"></a-text>
    </a-entity>

    <!-- GAME OVER -->
    <a-text id="gameOverText"
      value="GAME OVER"
      position="0 0 -1"
      align="center"
      color="red"
      width="3"
      visible="false">
    </a-text>

    <!-- RESTART BUTTON ENTITY -->
    <a-entity id="restartEntity"
      position="0 -0.5 -1"
      visible="false">

      <a-box id="restartBox"
        color="green"
        depth="0.1"
        height="0.25"
        width="0.7">
      </a-box>

      <a-text value="RESTART"
        align="center"
        color="white"
        position="0 0 0.06"
        width="2">
      </a-text>

    </a-entity>

  </a-camera>

  <!-- TARGET -->
  <a-sphere
    id="target"
    radius="0.2"
    color="yellow"
    visible="false"
    float
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
