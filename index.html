<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Final Working Game</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script>
let score = 0;

// spawn in front of camera
function spawnObject(){
  let target = document.querySelector("#target");

  target.setAttribute('position', '0 0 -1.5');
  target.setAttribute('visible', true);
}

// ✅ THIS IS THE KEY FIX
AFRAME.registerComponent('collect', {
  init: function () {

    // triggered when cursor stays on object
    this.el.addEventListener('mouseenter', () => {

      this.el.setAttribute('visible', false);

      score++;
      document.querySelector("#score")
        .setAttribute('value', "Score: " + score);

      setTimeout(() => {
        spawnObject();
      }, 1000);
    });

  }
});

// first spawn
setTimeout(() => {
  spawnObject();
}, 2000);

</script>

<a-scene ar>

  <!-- Camera -->
  <a-camera>

    <!-- 🔥 FUSE CURSOR (IMPORTANT) -->
    <a-cursor fuse="true" fuse-timeout="1000"></a-cursor>

    <!-- Score -->
    <a-text id="score"
      value="Score: 0"
      position="0 -0.2 -0.5"
      align="center">
    </a-text>

  </a-camera>

  <!-- Target -->
  <a-sphere
    id="target"
    radius="0.25"
    color="yellow"
    visible="false"
    collect>
  </a-sphere>

</a-scene>

</body>
</html>
